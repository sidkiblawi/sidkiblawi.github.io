# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Sid Kiblawi
# email_safe: sidkiblawi(at)gmail(dot)com
description: >- # this means to ignore newlines until "baseurl:"
    Artificial Intelligence Researcher
baseurl: "" # the subpath of your site, e.g. /blog
url: https://sidkiblawi.com # the base hostname & protocol for your site, e.g. http://example.com
timezone: America/Los_Angeles

# twitter_username: sidkiblawi
github_username:  sidkiblawi
linkedin_username: sidkiblawi
# facebook_username: sidkiblawi
instagram_username: sidkiblawi

show_excerpts: true

# Pages that appear in the site header nav.
# Any page not listed here is hidden from the nav (still accessible by URL).
header_pages:
  - about.md

# Build settings
theme: minima
plugins:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem
  - jekyll-feed # Create an Atom feed using the official Jekyll feed gem
  - jekyll-seo-tag # Create SEO tags
  - jekyll-paginate-v2 # Paginate (v2 supports paginating any page)

# Custom collections.
# `private_thoughts` is a private collection encrypted with staticrypt at
# build time. The CI workflow encrypts everything under _site/private-thoughts/
# after Jekyll builds it, so visitors hit a password prompt.
collections:
  private_thoughts:
    output: true
    permalink: /private-thoughts/:path/

# Defaults applied to all posts. Override `private` in a post's front matter.
# When JEKYLL_ENV=public, _plugins/private_posts.rb removes posts with
# `private: true` from the build (used by the public Cloudflare Pages site).
defaults:
  - scope:
      path: ""
      type: posts
    values:
      private: false
  - scope:
      path: ""
      type: private_thoughts
    values:
      layout: post
      sitemap: false # keep these out of sitemap.xml so search engines ignore them

# jekyll-paginate-v2 site-wide defaults
# Enable per-page by adding `pagination: { enabled: true }` in front matter.
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - page :num'
  sort_field: 'date'
  sort_reverse: true

cdn:
  mathjax:        https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
   - Gemfile
   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
