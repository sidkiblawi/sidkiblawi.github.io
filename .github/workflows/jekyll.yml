name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Encrypt private-thoughts with staticrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${STATICRYPT_PASSWORD:-}" ]; then
            echo "::error::STATICRYPT_PASSWORD repo secret is not set."
            exit 1
          fi
          shopt -s globstar nullglob
          files=(_site/private-thoughts/**/*.html _site/private-thoughts/*.html)
          # de-duplicate (the two globs may overlap)
          mapfile -t files < <(printf '%s\n' "${files[@]}" | sort -u)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No HTML files found under _site/private-thoughts/."
            exit 1
          fi
          echo "Found ${#files[@]} file(s) to encrypt:"
          printf '  %s\n' "${files[@]}"
          # Encrypt each file one at a time, writing the encrypted output
          # back over the original (staticrypt -d <dir> writes to <dir>/<basename>).
          for f in "${files[@]}"; do
            dir=$(dirname "$f")
            echo "Encrypting: $f"
            npx -y staticrypt@3 "$f" \
              --password "$STATICRYPT_PASSWORD" \
              --remember 30 \
              --directory "$dir"
          done
          echo "--- Verifying encryption ---"
          if grep -q 'staticrypt_encrypted_msg\|encryptedMsg' _site/private-thoughts/index.html; then
            echo "OK: index.html is encrypted."
          else
            echo "::error::index.html does not appear to be encrypted."
            head -60 _site/private-thoughts/index.html
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
